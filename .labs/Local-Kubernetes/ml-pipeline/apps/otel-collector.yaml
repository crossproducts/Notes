apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "16"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: 0.156.0
    helm:
      releaseName: otel-collector
      values: |
        mode: daemonset
        image:
          repository: otel/opentelemetry-collector-contrib
          tag: 0.152.0
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        presets:
          logsCollection:
            enabled: true
          kubernetesAttributes:
            enabled: true
        config:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: "0.0.0.0:4317"
                http:
                  endpoint: "0.0.0.0:4318"
          processors:
            batch:
              send_batch_size: 1000
              timeout: 10s
            k8sattributes:
              extract:
                metadata:
                  - k8s.namespace.name
                  - k8s.pod.name
                  - k8s.pod.uid
                  - k8s.node.name
                  - k8s.deployment.name
                  - k8s.container.name
            resource:
              attributes:
                - key: cluster.name
                  value: mlops
                  action: upsert
          exporters:
            elasticsearch:
              endpoints:
                - http://elasticsearch-master.elasticsearch.svc.cluster.local:9200
              logs_index: otel-logs
              sending_queue:
                enabled: true
                num_consumers: 2
                queue_size: 1000
              retry:
                enabled: true
            otlp/tempo:
              endpoint: tempo.tempo.svc.cluster.local:4317
              tls:
                insecure: true
          service:
            pipelines:
              logs:
                receivers: [filelog]
                processors: [k8sattributes, resource, batch]
                exporters: [elasticsearch]
              traces:
                receivers: [otlp]
                processors: [k8sattributes, resource, batch]
                exporters: [otlp/tempo]
  destination:
    server: https://kubernetes.default.svc
    namespace: otel-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
