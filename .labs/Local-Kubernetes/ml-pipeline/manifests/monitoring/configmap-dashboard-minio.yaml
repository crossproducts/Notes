apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-minio
  labels:
    grafana_dashboard: "1"
data:
  minio-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "panels": [
        {
          "title": "Total S3 Requests/sec",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(minio_s3_requests_total{namespace=\"minio\"}[5m]))",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "title": "S3 Errors/sec",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(minio_s3_requests_errors_total{namespace=\"minio\"}[5m]))",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.1 }
                ]
              }
            }
          }
        },
        {
          "title": "Storage Used",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "minio_cluster_usage_total_bytes{namespace=\"minio\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "title": "Object Count",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "minio_cluster_usage_object_total{namespace=\"minio\"}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "S3 Request Rate by API",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (api) (rate(minio_s3_requests_total{namespace=\"minio\"}[5m]))",
              "legendFormat": "{{api}}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "fillOpacity": 15 } } }
        },
        {
          "title": "S3 Request Latency (p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (le, api) (rate(minio_s3_requests_duration_seconds_bucket{namespace=\"minio\"}[5m])))",
              "legendFormat": "p99 {{api}}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "title": "Network Throughput",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(minio_s3_traffic_received_bytes_total{namespace=\"minio\"}[5m]))",
              "legendFormat": "received",
              "refId": "A"
            },
            {
              "expr": "sum(rate(minio_s3_traffic_sent_bytes_total{namespace=\"minio\"}[5m]))",
              "legendFormat": "sent",
              "refId": "B"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "Bps" } }
        },
        {
          "title": "Bucket Usage",
          "type": "bargauge",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "minio_bucket_usage_total_bytes{namespace=\"minio\"}",
              "legendFormat": "{{bucket}}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        }
      ],
      "schemaVersion": 39,
      "tags": ["mlops", "minio"],
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "title": "MinIO",
      "uid": "minio-metrics"
    }
