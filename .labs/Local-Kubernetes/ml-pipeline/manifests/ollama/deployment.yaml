apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate  # PVC is RWO; rolling update would deadlock on the volume
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:0.13.4
          ports:
            - name: http
              containerPort: 11434
          env:
            - name: OLLAMA_PRELOAD_MODELS
              value: "qwen2.5:3b qwen3:0.6b"
            - name: OLLAMA_CONTEXT_LENGTH
              value: "4096"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    until ollama list >/dev/null 2>&1; do sleep 2; done
                    for m in $OLLAMA_PRELOAD_MODELS; do
                      ollama pull "$m" || true
                    done
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 8Gi
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
