apiVersion: v1
kind: ConfigMap
metadata:
  name: evidently-config
data:
  config.yaml: |
    # Evidently UI workspace configuration
    # Reports and test suites generated by Airflow DAGs or JupyterLab
    # are stored in the /workspace directory.
    #
    # To add reports programmatically:
    #   from evidently.ui.workspace import Workspace
    #   ws = Workspace("/workspace")
    #   ws.add_report(report)
    workspace_path: /workspace
