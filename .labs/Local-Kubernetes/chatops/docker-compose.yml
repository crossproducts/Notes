services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mattermost
      POSTGRES_PASSWORD: mattermost
      POSTGRES_DB: mattermost
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - chatops
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mattermost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mattermost:
    image: mattermost/mattermost-team-edition:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8065:8065"
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://mattermost:mattermost@postgres:5432/mattermost?sslmode=disable
      MM_SERVICESETTINGS_SITEURL: http://localhost:8065
      MM_SERVICESETTINGS_ENABLEBOTACCOUNTCREATION: "true"
      MM_SERVICESETTINGS_ENABLEPOSTUSERNAMEOVERRIDE: "true"
      MM_SERVICESETTINGS_ENABLEPOSTICONOVERRIDE: "true"
    volumes:
      - mattermost-config:/mattermost/config
      - mattermost-data:/mattermost/data
      - mattermost-logs:/mattermost/logs
      - mattermost-plugins:/mattermost/plugins
    networks:
      - chatops
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8065/api/v4/system/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  bot:
    build: ./bot
    restart: unless-stopped
    depends_on:
      mattermost:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MATTERMOST_URL: http://mattermost:8065
      BOT_USERNAME: k8s-bot
      KUBECONFIG: /home/node/.kube/config
      HEALTH_CHECK_INTERVAL_MS: "300000"
      HEALTH_CHECK_CHANNEL: k8s-alerts
      CLAUDE_MODEL: claude-sonnet-4-20250514
    volumes:
      - ${HOME}/.kube/config:/home/node/.kube/config:ro
    networks:
      - chatops
      - k3d-mlops

networks:
  chatops:
    driver: bridge
  k3d-mlops:
    external: true

volumes:
  postgres-data:
  mattermost-config:
  mattermost-data:
  mattermost-logs:
  mattermost-plugins:
