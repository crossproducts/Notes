apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.13.2/manifests/install.yaml
  - argocd-ingress.yaml

patches:
  - target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cmd-params-cm
      data:
        server.insecure: "true"
  - target:
      kind: Secret
      name: argocd-secret
    patch: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: argocd-secret
      stringData:
        admin.password: "$2b$10$snhGfQkT/mzrtoC0N/n.AOpvCW5o4gw4YmImd1BaOQM2z07EeqOQW"
        admin.passwordMtime: "2026-01-01T00:00:00Z"
