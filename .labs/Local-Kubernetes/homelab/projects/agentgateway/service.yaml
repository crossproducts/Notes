apiVersion: v1
kind: Service
metadata:
  name: agentgateway
  namespace: agentgateway
  labels:
    app: agentgateway
spec:
  type: ClusterIP
  selector:
    app: agentgateway
  ports:
    - name: proxy
      port: 3000
      targetPort: 3000
      protocol: TCP
    - name: admin
      port: 15000
      targetPort: 15000
      protocol: TCP
