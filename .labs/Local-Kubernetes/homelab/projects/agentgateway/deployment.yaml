apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgateway
  namespace: agentgateway
  labels:
    app: agentgateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentgateway
  template:
    metadata:
      labels:
        app: agentgateway
    spec:
      containers:
        - name: agentgateway
          image: cr.agentgateway.dev/agentgateway:v1.2.0
          args: ["-f", "/config/config.yaml"]
          ports:
            - name: proxy
              containerPort: 3000
              protocol: TCP
            - name: admin
              containerPort: 15000
              protocol: TCP
          env:
            - name: ADMIN_ADDR
              value: "0.0.0.0:15000"
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agentgateway-secrets
                  key: OPENROUTER_API_KEY
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agentgateway-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /
              port: 15000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 15000
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: agentgateway-config
