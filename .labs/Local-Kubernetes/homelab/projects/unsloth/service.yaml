apiVersion: v1
kind: Service
metadata:
  name: unsloth-studio
  namespace: unsloth
  labels:
    app: unsloth-studio
spec:
  type: ClusterIP
  selector:
    app: unsloth-studio
  ports:
    - name: studio
      port: 8000
      targetPort: 8000
      protocol: TCP
    - name: jupyter
      port: 8888
      targetPort: 8888
      protocol: TCP
