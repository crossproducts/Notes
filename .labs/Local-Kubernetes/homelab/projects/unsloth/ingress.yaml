apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: unsloth-studio
  namespace: unsloth
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: unsloth.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: unsloth-studio
                port:
                  number: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: unsloth-jupyter
  namespace: unsloth
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: jupyter.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: unsloth-studio
                port:
                  number: 8888
