apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kibana
  namespace: kibana
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: kibana.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kibana
                port:
                  number: 5601
