apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-cli-config
  namespace: hermes
  labels:
    app: hermes-gateway
data:
  cli-config.yaml: |
    llm:
      providers:
        - name: ollama-cheap
          type: ollama
          base_url: http://ollama.platform.svc.cluster.local:11434
          model: qwen3:0.6b
          tier: cheap

        - name: ollama-moderate
          type: ollama
          base_url: http://ollama.platform.svc.cluster.local:11434
          model: qwen2.5:3b
          tier: moderate

        - name: openrouter-complex
          type: openrouter
          model: anthropic/claude-sonnet-4
          tier: complex

        - name: openrouter-flash
          type: openrouter
          model: google/gemini-2.5-flash
          tier: complex

        - name: anthropic-direct
          type: anthropic
          model: claude-sonnet-4-20250514
          tier: complex

    agent:
      memory_path: /opt/data/memory

    browser:
      headless: true
