apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-gateway
  namespace: hermes
  labels:
    app: hermes-gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes-gateway
  template:
    metadata:
      labels:
        app: hermes-gateway
    spec:
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:latest
          args: ["gateway", "run"]
          ports:
            - containerPort: 9000
              protocol: TCP
          env:
            - name: OLLAMA_BASE_URL
              value: http://host.k3d.internal:11434
            - name: HERMES_INFERENCE_PROVIDER
              value: ollama
            - name: LLM_MODEL
              value: qwen2.5:3b
            - name: HERMES_UID
              value: "10000"
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_PORT
              value: "9000"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-api-server-key
                  key: API_SERVER_KEY
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-cloud-keys
                  key: NVIDIA_API_KEY
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
            - name: cli-config
              mountPath: /opt/config/cli-config.yaml
              subPath: cli-config.yaml
              readOnly: true
          resources:
            requests:
              memory: 1Gi
              cpu: 500m
            limits:
              memory: 4Gi
              cpu: "2"
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: hermes-data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: cli-config
          configMap:
            name: hermes-cli-config
