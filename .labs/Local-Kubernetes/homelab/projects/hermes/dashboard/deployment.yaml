apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-dashboard
  namespace: hermes
  labels:
    app: hermes-dashboard
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes-dashboard
  template:
    metadata:
      labels:
        app: hermes-dashboard
    spec:
      containers:
        - name: dashboard
          image: nousresearch/hermes-agent:latest
          args: ["dashboard", "--host", "0.0.0.0", "--no-open", "--insecure"]
          ports:
            - containerPort: 9119
              protocol: TCP
          env:
            - name: HERMES_UID
              value: "10000"
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /
              port: 9119
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 9119
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: hermes-data
          persistentVolumeClaim:
            claimName: hermes-data
