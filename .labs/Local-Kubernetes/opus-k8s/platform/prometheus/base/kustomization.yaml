apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

# kube-prometheus-stack. Required by Kiali (traffic graph) and Argo Rollouts
# (AnalysisTemplate success-rate queries). enablePrometheusMerge on istiod means
# the sidecar metrics are scraped from the app pods.
helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 66.3.1
    releaseName: kube-prometheus-stack
    namespace: monitoring
    includeCRDs: true
    valuesFile: values.yaml
