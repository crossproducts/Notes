apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Bootstraps ArgoCD itself + the root-app that hands control over to GitOps.
# Apply with:  kubectl apply -k bootstrap/ --server-side
#
# Pin to a release tag (not `stable`) so the lab is reproducible.
# Bump the tag here when upgrading: https://github.com/argoproj/argo-cd/releases

# Stamps `namespace: argocd` onto every namespaced resource that doesn't already
# specify one — including the upstream install.yaml, which is namespaceless.
namespace: argocd

resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.13.2/manifests/install.yaml
  - argocd-ingress.yaml
  - root-app.yaml
