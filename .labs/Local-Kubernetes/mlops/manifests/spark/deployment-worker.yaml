apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  labels:
    app: spark
    role: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark
      role: worker
  template:
    metadata:
      labels:
        app: spark
        role: worker
    spec:
      containers:
        - name: spark-worker
          image: apache/spark-py:v3.4.0
          command:
            - /bin/bash
            - -c
            - |
              export SPARK_NO_DAEMONIZE=true
              export SPARK_WORKER_MEMORY=1G
              export SPARK_WORKER_CORES=2
              export SPARK_WORKER_WEBUI_PORT=8081
              export USER=spark
              mkdir -p /tmp/spark-logs
              export SPARK_LOG_DIR=/tmp/spark-logs
              /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
          ports:
            - name: web
              containerPort: 8081
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
