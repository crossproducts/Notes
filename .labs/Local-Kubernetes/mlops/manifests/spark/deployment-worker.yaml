apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  labels:
    app: spark
    role: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark
      role: worker
  template:
    metadata:
      labels:
        app: spark
        role: worker
    spec:
      containers:
        - name: spark-worker
          image: apache/spark-py:latest
          command: ["/opt/spark/sbin/start-worker.sh"]
          args: ["spark://spark-master:7077", "--webui-port", "8081", "--memory", "1G", "--cores", "2"]
          ports:
            - name: web
              containerPort: 8081
          env:
            - name: SPARK_NO_DAEMONIZE
              value: "true"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
