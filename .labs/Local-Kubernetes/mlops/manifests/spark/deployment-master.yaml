apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  labels:
    app: spark
    role: master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark
      role: master
  template:
    metadata:
      labels:
        app: spark
        role: master
    spec:
      containers:
        - name: spark-master
          image: apache/spark-py:latest
          command: ["/opt/spark/sbin/start-master.sh"]
          args: ["--host", "0.0.0.0", "--port", "7077", "--webui-port", "8080"]
          ports:
            - name: web
              containerPort: 8080
            - name: spark
              containerPort: 7077
          env:
            - name: SPARK_NO_DAEMONIZE
              value: "true"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
