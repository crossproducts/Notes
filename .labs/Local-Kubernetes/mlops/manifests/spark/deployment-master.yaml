apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  labels:
    app: spark
    role: master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark
      role: master
  template:
    metadata:
      labels:
        app: spark
        role: master
    spec:
      containers:
        - name: spark-master
          image: apache/spark-py:v3.4.0
          command:
            - /bin/bash
            - -c
            - |
              # Fix: ensure current UID has a passwd entry (fixes Hadoop KerberosAuthException)
              if ! whoami &>/dev/null; then
                echo "spark:x:$(id -u):$(id -g):spark:/tmp:/bin/bash" >> /etc/passwd
              fi
              export SPARK_MASTER_HOST=0.0.0.0
              export SPARK_MASTER_PORT=7077
              export SPARK_MASTER_WEBUI_PORT=8080
              export SPARK_NO_DAEMONIZE=true
              mkdir -p /tmp/spark-logs /tmp/spark-work
              export SPARK_LOG_DIR=/tmp/spark-logs
              /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
          ports:
            - name: web
              containerPort: 8080
            - name: spark
              containerPort: 7077
          securityContext:
            runAsUser: 0
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
