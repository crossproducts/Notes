apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Bootstraps ArgoCD itself + the root-app that hands control over to GitOps.
# Apply with:  kubectl apply -k bootstrap/ --server-side
namespace: argocd

resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.13.2/manifests/install.yaml
  - argocd-ingress.yaml
  - root-app.yaml

# Run argocd-server in insecure mode so it serves plain HTTP on :8080
patches:
  - target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
    patch: |
      - op: add
        path: /data
        value:
          server.insecure: "true"
