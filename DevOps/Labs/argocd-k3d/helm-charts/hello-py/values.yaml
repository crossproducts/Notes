replicaCount: 1

image:
  repository: python
  tag: "3.12-slim"
  pullPolicy: IfNotPresent

greeting: "Hello from Python on k3d!"

service:
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: traefik
  hosts:
    - hello.localhost
    - hello.127.0.0.1.nip.io

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi
