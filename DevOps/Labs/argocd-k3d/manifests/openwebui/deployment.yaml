apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  labels:
    app: openwebui
spec:
  replicas: 1
  strategy:
    type: Recreate  # PVC is RWO; rolling update would deadlock on the volume
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:v0.5.7
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama.ollama.svc.cluster.local:11434
            - name: WEBUI_AUTH
              value: "true"   # first signup becomes admin; set "false" to disable auth entirely
            # LM Studio runs on the host (desktop app), not in the cluster.
            # `host.k3d.internal` is a DNS alias k3d injects via CoreDNS that
            # points at the host gateway, so pods can reach host services.
            # Requires: LM Studio's "Local Server" tab is running on :1234 with
            # "Serve on Local Network" enabled, otherwise it binds to 127.0.0.1
            # only and Docker can't reach it. The key is unused but the variable
            # must be set or open-webui drops the backend at startup.
            - name: OPENAI_API_BASE_URLS
              value: "http://host.k3d.internal:1234/v1"
            - name: OPENAI_API_KEYS
              value: "lm-studio"
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openwebui-data
