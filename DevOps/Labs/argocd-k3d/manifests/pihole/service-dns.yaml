apiVersion: v1
kind: Service
metadata:
  name: pihole-dns
spec:
  # LoadBalancer so k3d's serverlb exposes port 53 to the host (requires
  # `-p "53:53@loadbalancer/udp"` on `k3d cluster create`). If port 53 conflicts
  # on Windows (DNS Client / WSL / VPN), stop the conflicting service or switch
  # this to NodePort with a non-privileged port for testing.
  type: LoadBalancer
  selector:
    app: pihole
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
