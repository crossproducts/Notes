apiVersion: v1
kind: ConfigMap
metadata:
  name: pihole-dnsmasq-custom
data:
  # Wildcard: any *.nip.io hostname resolves to 127.0.0.1, where the ingress
  # controller listens. New apps work automatically — no per-host wiring.
  # Answering locally also bypasses upstream DNS rebind protection that would
  # otherwise strip 127.0.0.1 answers from public resolvers.
  02-custom.conf: |
    address=/nip.io/127.0.0.1
