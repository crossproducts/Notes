apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app: openclaw
spec:
  # Single-instance stateful gateway — never scale past 1.
  replicas: 1
  strategy:
    type: Recreate  # PVC is RWO; rolling update would deadlock on the volume
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # OpenClaw rewrites openclaw.json at runtime (e.g. plugin auto-enable
      # state). A direct ConfigMap mount is read-only, so the gateway crashes
      # with EROFS on first start. Copy the file into the writable PVC at
      # /home/node/.openclaw/ on every pod start — git stays the source of
      # truth, and any in-cluster mutations get reset to declared state on
      # restart.
      initContainers:
        - name: init-config
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              mkdir -p /home/node/.openclaw/workspace
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node/.openclaw
            - name: openclaw-config
              mountPath: /config
              readOnly: true
      containers:
        - name: gateway
          image: ghcr.io/openclaw/openclaw:slim
          imagePullPolicy: IfNotPresent
          command:
            - node
            - /app/dist/index.js
            - gateway
            - run
          ports:
            - name: http
              containerPort: 18789
              protocol: TCP
          env:
            - name: HOME
              value: /home/node
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            # OPENCLAW_GATEWAY_TOKEN intentionally omitted — auth.mode is
            # "trusted-proxy" in the configmap, and OpenClaw rejects the
            # gateway with `mixed_trusted_proxy_token` if both are set.
            # Implicit Ollama discovery: OpenClaw queries /api/tags at the
            # hardcoded http://127.0.0.1:11434 when this is set and there is
            # no models.providers.ollama block in openclaw.json. The socat
            # sidecar below forwards 127.0.0.1:11434 to the cluster service.
            - name: OLLAMA_API_KEY
              value: ollama-local
            # OpenAI provider key. Secret is created out-of-band from
            # DevOps/Labs/argocd-k3d/.env via `kubectl create secret …
            # --from-env-file`, then annotated Prune=false so ArgoCD
            # doesn't sweep it on sync. See .env.example for setup.
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-llm-keys
                  key: OPENAI_API_KEY
                  optional: true
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node/.openclaw
            - name: tmp
              mountPath: /tmp
          # OpenClaw exposes /healthz (liveness) and /readyz (readiness).
          # exec probes via node avoid needing curl in the slim image.
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
        # Sidecar: forwards 127.0.0.1:11434 inside the pod to the cluster's
        # Ollama service. Required because OpenClaw's implicit-discovery code
        # path is hardcoded to 127.0.0.1:11434 — there's no env var to point
        # it elsewhere, and any explicit baseUrl in openclaw.json disables
        # auto-discovery entirely.
        - name: ollama-proxy
          image: alpine/socat:1.8.0.0
          imagePullPolicy: IfNotPresent
          args:
            - "-d"
            - "TCP-LISTEN:11434,bind=127.0.0.1,fork,reuseaddr"
            - "TCP:ollama.ollama.svc.cluster.local:11434"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: openclaw-home
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: openclaw-config
          configMap:
            name: openclaw-config
        # OpenClaw needs /tmp writable (readOnlyRootFilesystem: true above).
        - name: tmp
          emptyDir: {}
