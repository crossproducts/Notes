apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app: openclaw
spec:
  # Single-instance stateful gateway — never scale past 1.
  replicas: 1
  strategy:
    type: Recreate  # PVC is RWO; rolling update would deadlock on the volume
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: ghcr.io/openclaw/openclaw:slim
          imagePullPolicy: IfNotPresent
          command:
            - node
            - /app/dist/index.js
            - gateway
            - run
          ports:
            - name: http
              containerPort: 18789
              protocol: TCP
          env:
            - name: HOME
              value: /home/node
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: OPENCLAW_CONFIG_PATH
              value: /etc/openclaw/openclaw.json
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node/.openclaw
            - name: openclaw-config
              mountPath: /etc/openclaw
              readOnly: true
            - name: tmp
              mountPath: /tmp
          # OpenClaw exposes /healthz (liveness) and /readyz (readiness).
          # exec probes via node avoid needing curl in the slim image.
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
      volumes:
        - name: openclaw-home
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: openclaw-config
          configMap:
            name: openclaw-config
        - name: tmp
          emptyDir: {}
