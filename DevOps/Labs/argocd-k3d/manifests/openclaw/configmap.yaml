apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  labels:
    app: openclaw
data:
  # OpenClaw gateway config. Schema reference:
  # https://github.com/openclaw/openclaw/blob/main/docs/providers/ollama.md
  # https://github.com/openclaw/openclaw/blob/main/scripts/k8s/manifests/configmap.yaml
  #
  # bind=lan (0.0.0.0) so the in-cluster Service can reach the gateway on the
  # pod IP. Default upstream bind is "loopback" which only works with kubectl
  # port-forward and produces "connection refused" on Service/Ingress probes.
  #
  # No models.providers block — both ollama and openai use plugin-driven
  # discovery from env vars: OLLAMA_API_KEY (live /api/tags discovery) and
  # OPENAI_API_KEY (static built-in catalog of ~40 models). Adding any
  # explicit provider entry suppresses that plugin's discovery, so the
  # picker would only show what's enumerated in models[] or named in
  # agents.defaults. Per-model num_ctx control is gone with this pattern;
  # the Ollama deployment caps default context globally with
  # OLLAMA_CONTEXT_LENGTH=4096 to prevent KV-cache OOM.
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "trustedProxies": ["10.42.0.0/16"],
        "auth": {
          "mode": "trusted-proxy",
          "trustedProxy": {
            "userHeader": "x-forwarded-user",
            "requiredHeaders": ["x-forwarded-proto", "x-forwarded-host"]
          }
        },
        "controlUi": {
          "enabled": true,
          "allowedOrigins": ["http://openclaw.localhost"],
          "allowInsecureAuth": true,
          "dangerouslyDisableDeviceAuth": true
        }
      },
      "agents": {
        "defaults": {
          "workspace": "/home/node/.openclaw/workspace",
          "model": {
            "primary": "openai/gpt-4o-mini",
            "fallbacks": ["ollama/qwen2.5:3b"]
          }
        },
        "list": [
          {
            "id": "default",
            "name": "OpenClaw Assistant",
            "workspace": "/home/node/.openclaw/workspace"
          }
        ]
      },
      "cron": { "enabled": false }
    }
