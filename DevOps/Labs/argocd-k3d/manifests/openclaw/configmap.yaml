apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
  labels:
    app: openclaw
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "trustedProxies": ["10.42.0.0/16"],
        "auth": {
          "mode": "trusted-proxy",
          "trustedProxy": {
            "userHeader": "x-forwarded-user",
            "requiredHeaders": ["x-forwarded-proto", "x-forwarded-host"]
          }
        },
        "controlUi": {
          "enabled": true,
          "allowedOrigins": ["http://openclaw.localhost"],
          "allowInsecureAuth": true,
          "dangerouslyDisableDeviceAuth": true
        }
      },
      "models": {
        "providers": {
          "ollama": {
            "api": "ollama",
            "baseUrl": "http://ollama.ollama.svc.cluster.local:11434",
            "apiKey": "ollama-local",
            "models": [
              {
                "id": "qwen2.5:3b",
                "name": "Qwen 2.5 3B",
                "contextWindow": 4096,
                "maxTokens": 2048,
                "input": ["text"],
                "cost": {
                  "input": 0,
                  "output": 0,
                  "cacheRead": 0,
                  "cacheWrite": 0
                }
              },
              {
                "id": "llama3.2:3b",
                "name": "Llama 3.2 3B",
                "contextWindow": 4096,
                "maxTokens": 2048,
                "input": ["text"],
                "cost": {
                  "input": 0,
                  "output": 0,
                  "cacheRead": 0,
                  "cacheWrite": 0
                }
              },
              {
                "id": "llama3.2:1b",
                "name": "Llama 3.2 1B",
                "contextWindow": 4096,
                "maxTokens": 2048,
                "input": ["text"],
                "cost": {
                  "input": 0,
                  "output": 0,
                  "cacheRead": 0,
                  "cacheWrite": 0
                }
              }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "workspace": "/home/node/.openclaw/workspace",
          "model": {
            "primary": "ollama/qwen2.5:3b",
            "fallbacks": ["openai/gpt-4o-mini"]
          }
        },
        "list": [
          {
            "id": "default",
            "name": "OpenClaw Assistant",
            "workspace": "/home/node/.openclaw/workspace"
          }
        ]
      },
      "cron": {
        "enabled": false
      }
    }