apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  labels:
    app: openclaw
data:
  # OpenClaw gateway config.
  # Schema: https://github.com/openclaw/openclaw/blob/main/docs/providers/ollama.md
  # Concepts: https://openclawx.cloud/en/concepts/model-providers
  #
  # IMPLICIT-DISCOVERY MODE (no models.providers block):
  #   - Ollama: discovered when OLLAMA_API_KEY is set in the deployment AND
  #     the gateway can reach http://127.0.0.1:11434/api/tags. The socat
  #     sidecar in the deployment forwards 127.0.0.1:11434 to the in-cluster
  #     ollama.ollama.svc.cluster.local:11434 Service. Discovery only keeps
  #     models that report `tools` capability, reads contextWindow from
  #     model_info, and sets cost to 0. Adding any models.providers.ollama
  #     block here would DISABLE auto-discovery.
  #   - OpenAI: shipped in OpenClaw's bundled pi-ai catalog. No provider
  #     block needed; OPENAI_API_KEY in the deployment is sufficient.
  #     Reference models as openai/<model>, e.g. openai/gpt-4o-mini.
  #
  # bind=lan (0.0.0.0) so the in-cluster Service can reach the gateway on
  # the pod IP. Default upstream bind is "loopback" which only works with
  # kubectl port-forward and produces "connection refused" on Service probes.
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "trustedProxies": ["10.42.0.0/16"],
        "auth": {
          "mode": "trusted-proxy",
          "trustedProxy": {
            "userHeader": "x-forwarded-user",
            "requiredHeaders": ["x-forwarded-proto", "x-forwarded-host"]
          }
        },
        "controlUi": {
          "enabled": true,
          "allowedOrigins": ["http://openclaw.localhost"],
          "allowInsecureAuth": true,
          "dangerouslyDisableDeviceAuth": true
        }
      },
      "agents": {
        "defaults": {
          "workspace": "/home/node/.openclaw/workspace",
          "model": {
            "primary": "ollama/qwen2.5:3b",
            "fallbacks": ["openai/gpt-4o-mini"]
          }
        },
        "list": [
          {
            "id": "default",
            "name": "OpenClaw Assistant",
            "workspace": "/home/node/.openclaw/workspace"
          }
        ]
      },
      "cron": { "enabled": false }
    }