apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  labels:
    app: openclaw
data:
  # OpenClaw gateway config. Schema reference:
  # https://github.com/openclaw/openclaw/blob/main/docs/providers/ollama.md
  # https://github.com/openclaw/openclaw/blob/main/scripts/k8s/manifests/configmap.yaml
  #
  # bind=lan (0.0.0.0) so the in-cluster Service can reach the gateway on the
  # pod IP. Default upstream bind is "loopback" which is service-IP unreachable.
  # Access path is `kubectl port-forward svc/openclaw 18789:18789` — loopback
  # browser connections (127.0.0.1) are auto-approved by OpenClaw's pairing
  # gate, so no device-pair prompt and no x-openclaw-scopes gymnastics.
  #
  # Models block intentionally omitted — implicit Ollama discovery is enabled
  # via OLLAMA_API_KEY=ollama-local in the deployment. Defining a provider
  # block here would disable auto-discovery and force manual model entries.
  # Per-model num_ctx control is gone too; the Ollama deployment caps default
  # context globally with OLLAMA_CONTEXT_LENGTH=4096 to prevent KV-cache OOM.
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "auth": { "mode": "token" },
        "controlUi": {
          "enabled": true,
          "allowedOrigins": ["http://127.0.0.1:18789", "http://localhost:18789"]
        }
      },
      "agents": {
        "defaults": {
          "workspace": "/home/node/.openclaw/workspace",
          "experimental": { "localModelLean": true },
          "model": {
            "primary": "ollama/llama3.2:1b",
            "fallbacks": ["ollama/llama3.2:3b"]
          }
        },
        "list": [
          {
            "id": "default",
            "name": "OpenClaw Assistant",
            "workspace": "/home/node/.openclaw/workspace"
          }
        ]
      },
      "cron": { "enabled": false }
    }
