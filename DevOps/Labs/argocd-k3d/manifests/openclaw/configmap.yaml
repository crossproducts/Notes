apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  labels:
    app: openclaw
data:
  # OpenClaw gateway config. Schema reference:
  # https://github.com/openclaw/openclaw/blob/main/docs/providers/ollama.md
  # https://github.com/openclaw/openclaw/blob/main/scripts/k8s/manifests/configmap.yaml
  #
  # bind=lan (0.0.0.0) so the in-cluster Service can reach the gateway on the
  # pod IP. Default upstream bind is "loopback" which only works with kubectl
  # port-forward and produces "connection refused" on Service/Ingress probes.
  #
  # Models block intentionally omitted — implicit Ollama discovery is enabled
  # via OLLAMA_API_KEY=ollama-local in the deployment. Defining a provider
  # block here would disable auto-discovery and force manual model entries.
  # Per-model num_ctx control is gone too; the Ollama deployment caps default
  # context globally with OLLAMA_CONTEXT_LENGTH=4096 to prevent KV-cache OOM.
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "trustedProxies": ["10.42.0.0/16"],
        "auth": {
          "mode": "trusted-proxy",
          "trustedProxy": {
            "userHeader": "x-forwarded-user",
            "requiredHeaders": ["x-forwarded-proto", "x-forwarded-host"]
          }
        },
        "controlUi": {
          "enabled": true,
          "allowedOrigins": ["http://openclaw.localhost"],
          "allowInsecureAuth": true,
          "dangerouslyDisableDeviceAuth": true
        }
      },
      "models": {
        "providers": {
          "openai": {
            "baseUrl": "https://api.openai.com/v1",
            "apiKey": "OPENAI_API_KEY",
            "models": [
              { "id": "gpt-4o-mini", "name": "gpt-4o-mini", "input": ["text", "image"] },
              { "id": "gpt-4o", "name": "gpt-4o", "input": ["text", "image"] }
            ]
          },
          "ollama": {
            "baseUrl": "http://ollama.ollama.svc.cluster.local:11434",
            "apiKey": "ollama-local",
            "api": "ollama",
            "models": [
              { "id": "qwen2.5:3b", "name": "Qwen 2.5 3B", "input": ["text"] }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "workspace": "/home/node/.openclaw/workspace",
          "model": {
            "primary": "openai/gpt-4o-mini",
            "fallbacks": ["ollama/qwen2.5:3b"]
          }
        },
        "list": [
          {
            "id": "default",
            "name": "OpenClaw Assistant",
            "workspace": "/home/node/.openclaw/workspace"
          }
        ]
      },
      "cron": { "enabled": false }
    }
