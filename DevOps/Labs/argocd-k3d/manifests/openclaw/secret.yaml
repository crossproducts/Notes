apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
  labels:
    app: openclaw
type: Opaque
# Lab-only fixed gateway token. Pasted into the Control UI at first connect
# (Browser remembers it per profile after that). Same convention as the
# argocd admin/admin patch and pihole `changeme` elsewhere in this repo —
# convenience over rotation, only safe because access is via loopback
# port-forward (kubectl port-forward svc/openclaw 18789:18789).
# Rotate to `openssl rand -hex 32` and stop committing the value before
# pointing this lab at anything reachable from the network.
stringData:
  OPENCLAW_GATEWAY_TOKEN: 5e7a9c3b2f8d1e4a6c8b0d2f5e9a7c3b1f8d4e6a2c9b0d8f5e1a3c7b9d2f6e0a
