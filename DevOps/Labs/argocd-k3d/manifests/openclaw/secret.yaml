apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
  labels:
    app: openclaw
type: Opaque
# Lab-only fixed gateway token. Same convention as the argocd admin/admin
# patch and the pihole `changeme` password elsewhere in this repo —
# convenience over rotation, only safe because *.localhost is loopback-only.
# Rotate to `openssl rand -hex 32` and stop committing the value before
# pointing this lab at anything reachable from the network.
stringData:
  OPENCLAW_GATEWAY_TOKEN: 5e7a9c3b2f8d1e4a6c8b0d2f5e9a7c3b1f8d4e6a2c9b0d8f5e1a3c7b9d2f6e0a
