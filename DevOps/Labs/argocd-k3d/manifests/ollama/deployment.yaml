apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate  # PVC is RWO; rolling update would deadlock on the volume
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:0.6.8
          ports:
            - name: http
              containerPort: 11434
          env:
            # Space-separated list of models to preload via the postStart hook.
            # Idempotent — already-cached models are a no-op against the PVC.
            - name: OLLAMA_PRELOAD_MODELS
              value: "qwen2.5:3b"
            # Global cap on default model context. Without this, models that
            # advertise a 128K window (e.g. llama3.2:3b) try to allocate ~87 GiB
            # of KV cache on first load. OpenClaw's auto-discovery path can't
            # set per-model num_ctx, so the safety net lives here.
            - name: OLLAMA_CONTEXT_LENGTH
              value: "4096"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    until ollama list >/dev/null 2>&1; do sleep 2; done
                    for m in $OLLAMA_PRELOAD_MODELS; do
                      ollama pull "$m" || true
                    done
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 8Gi
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
