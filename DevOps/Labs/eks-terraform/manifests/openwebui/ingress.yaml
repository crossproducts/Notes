apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openwebui
spec:
  ingressClassName: traefik
  rules:
    - host: openwebui.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openwebui
                port:
                  number: 8080
