apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: podinfo
spec:
  parentRefs:
    - name: fable-gateway
      namespace: istio-system
      sectionName: https
  hostnames:
    - podinfo.dev.127.0.0.1.sslip.io
  rules:
    - backendRefs:
        - name: podinfo-stable
          port: 9898
