apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: opus-staging
servers: 1
agents: 2
ports:
  - port: 8080:80
    nodeFilters:
      - loadbalancer
  - port: 8443:443
    nodeFilters:
      - loadbalancer
options:
  k3s:
    extraArgs:
      # Disable Traefik only — Istio provides ingress. servicelb (klipper) is
      # kept so the Istio ingress-gateway LoadBalancer Service gets an IP.
      - arg: --disable=traefik
        nodeFilters:
          - server:*
