apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Gateway API standard-channel CRDs. k3s only ships these when Traefik is enabled,
# and we disable Traefik — so Istio's Gateway/HTTPRoute resources need these CRDs
# installed first (wave 0).
resources:
  - https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.1/standard-install.yaml
