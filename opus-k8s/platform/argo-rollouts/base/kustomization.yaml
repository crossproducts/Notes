apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argo-rollouts

# Argo Rollouts controller + dashboard. Manages Rollout CRs and rewrites Istio
# VirtualService weights during canary steps.
helmCharts:
  - name: argo-rollouts
    repo: https://argoproj.github.io/argo-helm
    version: 2.39.0
    releaseName: argo-rollouts
    namespace: argo-rollouts
    includeCRDs: true
    valuesFile: values.yaml
