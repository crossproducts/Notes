# Route keycloak.dev.127.0.0.1.sslip.io → keycloak service. TLS is terminated at
# the shared Istio gateway using the wildcard cert (overlays patch the hostname).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
spec:
  parentRefs:
    - name: fable-gateway
      namespace: istio-system
      sectionName: https
  hostnames:
    - keycloak.dev.127.0.0.1.sslip.io
  rules:
    - backendRefs:
        - name: keycloak-keycloakx-http
          port: 80
