apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kiali
  namespace: istio-system
spec:
  parentRefs:
    - name: fable-gateway
      namespace: istio-system
      sectionName: https
  hostnames:
    - kiali.dev.127.0.0.1.sslip.io
  rules:
    - backendRefs:
        - name: kiali
          port: 20001
